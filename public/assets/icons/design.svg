<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Blueprint/ruler -->
  <rect x="6" y="10" width="52" height="44" rx="4" fill="#1e3d5c" opacity="0.15"/>
  <rect x="6" y="10" width="52" height="44" rx="4" stroke="#1e3d5c" stroke-width="2.5"/>
  <!-- Grid lines -->
  <line x1="20" y1="10" x2="20" y2="54" stroke="#1e3d5c" stroke-width="1" opacity="0.4"/>
  <line x1="34" y1="10" x2="34" y2="54" stroke="#1e3d5c" stroke-width="1" opacity="0.4"/>
  <line x1="48" y1="10" x2="48" y2="54" stroke="#1e3d5c" stroke-width="1" opacity="0.4"/>
  <line x1="6" y1="24" x2="58" y2="24" stroke="#1e3d5c" stroke-width="1" opacity="0.4"/>
  <line x1="6" y1="38" x2="58" y2="38" stroke="#1e3d5c" stroke-width="1" opacity="0.4"/>
  <!-- House blueprint -->
  <polyline points="17,44 17,28 32,18 47,28 47,44" stroke="#3db5e8" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
  <rect x="27" y="34" width="10" height="10" stroke="#3db5e8" stroke-width="2" fill="none"/>
  <!-- Pencil -->
  <rect x="46" y="4" width="6" height="16" rx="1" transform="rotate(45 46 4)" fill="#3db5e8"/>
  <polygon points="38,42 36,50 44,48" fill="#3db5e8"/>
</svg>
